services:
  backend:
    image: ghcr.io/${GHCR_OWNER:-yeonghune}/arkeep-backend:${IMAGE_TAG:-latest}
    container_name: article-keep-backend
    environment:
      DATABASE_URL: "postgresql+asyncpg://${POSTGRES_USER:-archive}:${POSTGRES_PASSWORD:-archive}@db:5432/${POSTGRES_DB:-article_archive}"
      POSTGRES_USER: ${POSTGRES_USER:-archive}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-archive}
      POSTGRES_DB: ${POSTGRES_DB:-article_archive}
      POSTGRES_HOST: db
      POSTGRES_PORT: "5432"
      JWT_SECRET: ${JWT_SECRET:-change-me-in-local-env}
      GOOGLE_CLIENT_IDS: ${GOOGLE_CLIENT_IDS:-dev-google-client-id}
      CORS_ALLOWED_ORIGINS: ${CORS_ALLOWED_ORIGINS:-http://localhost:3000}
      REFRESH_TOKEN_COOKIE_SECURE: "true"
    networks:
      - prod-net

  frontend:
    image: ghcr.io/${GHCR_OWNER:-yeonghune}/arkeep-frontend:${IMAGE_TAG:-latest}
    container_name: article-keep-frontend
    environment:
      BACKEND_ORIGIN: ${BACKEND_ORIGIN:-http://backend:8000}
      NEXT_PUBLIC_API_BASE_URL: ${NEXT_PUBLIC_API_BASE_URL:-/backend}
      NEXT_PUBLIC_GOOGLE_CLIENT_ID: ${NEXT_PUBLIC_GOOGLE_CLIENT_ID:-dev-google-client-id}
    depends_on:
      - backend
    networks:
      - prod-net

  nginx:
    image: nginx:1.27-alpine
    container_name: article-keep-nginx
    depends_on:
      - frontend
      - backend
    ports:
      - "${NGINX_PORT:-8080}:8080"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
    networks:
      - prod-net

networks:
  prod-net:
    name: ${PROD_DOCKER_NETWORK:-arkeep-prod-net}
    external: true
